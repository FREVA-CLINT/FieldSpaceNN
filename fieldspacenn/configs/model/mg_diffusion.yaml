_target_: fieldspacenn.src.models.mg_diffusion.pl_mg_diffusion_model.LightningMGDiffusionModel
lambda_loss_dict:
  zooms:
    3:
      MSE_loss: 1
    5:
      MSE_loss: 1
    6:
      MSE_loss: 1
weight_decay: 0
lr_groups:
  default:
    lr: 0.001
    warmup: 2000
block_loss_mode: final_only
block_loss_weights: null
model:
  _target_: fieldspacenn.src.models.mg_diffusion.mg_diffusion_model.MGDiffusionModel
  n_blocks: 10
  block_step_ranges:
    - [0, 99]
    - [100, 199]
    - [200, 299]
    - [300, 399]
    - [400, 499]
    - [500, 599]
    - [600, 699]
    - [700, 799]
    - [800, 899]
    - [900, 999]
  inference_step_ranges: null
  pretrained_block_ckpt_path: /home/joe/PycharmProjects/stableclimgen/snapshots/test/mg_transformer/last.ckpt
  mgrids: ${mgrids}
  in_zooms: [3, 5, 6]
  in_features: 1
  out_features: 1
  lift_features: 1
  n_head_channels: 16
  use_mask: false
  n_groups_variables: [2]
