      seq_len_time: -1
      seq_len_depth: -1
      with_var_att: true
      update: shift
      embed_confs:
        embed_names: ["TimeEmbedder"]
        input_zoom: 3
        embed_confs: ${embedding}
        embed_mode: sum
    "conservative":
      _target_: fieldspacenn.src.modules.field_space.field_space_base.ConservativeLayerConfig
gaussian_diffusion:
  _target_: fieldspacenn.src.modules.diffusion.mg_respace.SpacedDiffusion
  diffusion_steps: 1000
  diffusion_step_scheduler:
    6: linear
    5: linear
